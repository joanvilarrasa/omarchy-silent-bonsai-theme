general {
    gaps_in = 0
}



# https://wiki.hyprland.org/Configuring/Variables/#decoration
decoration {
    rounding = 2
    shadow {
        enabled = false
    }
}


# https://wiki.hyprland.org/Configuring/Variables/#animations
animations {
    enabled = no
}

windowrule = match:class cursor, opacity 0.90
