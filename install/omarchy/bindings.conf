# Application bindings
$terminal = uwsm-app -- xdg-terminal-exec
$osdclient = swayosd-client --monitor "$(hyprctl monitors -j | jq -r '.[] | select(.focused == true).name')"

bindd = SUPER SHIFT, T, Terminal, exec, $terminal --working-directory="$(omarchy-cmd-terminal-cwd)"
bindd = SUPER SHIFT, F, File manager, exec, uwsm-app -- nautilus --new-window
bindd = SUPER SHIFT, B, Browser, exec, omarchy-launch-browser
bindd = SUPER SHIFT, E, Editor, exec, omarchy-launch-editor
bindd = SUPER SHIFT, P, Activity, exec, $terminal -e btop
bindd = SUPER, L, Lock Screen, exec, omarchy-lock-screen
bindd = SUPER SHIFT, ESCAPE, Shutdown, exec, omarchy-state clear re*-required & systemctl poweroff --no-wall
bind = , mouse:276, exec, $osdclient --output-volume raise
bind = , mouse:275, exec, $osdclient --output-volume lower

# Unbind things that I do not use
unbind = SUPER, RETURN
unbind = SUPER SHIFT ALT, B
unbind = SUPER SHIFT, N
unbind = SUPER SHIFT, D
unbind = SUPER SHIFT, G
unbind = SUPER SHIFT, W
unbind = SUPER SHIFT, SLASH
